<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Daily Page</title>
  <style>
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 10pt;
      line-height: 1.6;
      padding: 2em;
      position: relative;
      color: #ddd; 
      background-color: #222;
    }
    .nav-buttons {
      position: absolute;
      top: 1em;
      left: 1em;
      display: flex;
      flex-direction: row;
      gap: 0.5em;
    }
    .nav-buttons button {
      width: 80px; height: 30px; font-size: 0.7em;
      border: 1px solid #666; border-radius: 4px;
      background-color: #333; color: #eee; cursor: pointer;
    }
    .nav-buttons button:hover { background-color: #555; }
    .box1 { margin-top: 3em; }
    h3.bar3 { font-size: 1.2em; color: #eee; }
  </style>
  
  <script>
    const pad = (n) => String(n).padStart(2, '0');

    // URLから現在の日付を取得 (例: /2026/02/24.html)
    const getCurrentDateFromURL = () => {
      const path = location.pathname;
      const match = path.match(/\/(\d{4})\/(\d{2})\/(\d{2})\.html$/);
      if (!match) return null;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    };

    const goToRelativeDay = async (offset) => {
      let targetDate;
      
      if (offset === 0) {
        targetDate = new Date(); // 本当の「今日」
      } else {
        const baseDate = getCurrentDateFromURL();
        if (!baseDate) return;
        targetDate = new Date(baseDate);
        targetDate.setDate(targetDate.getDate() + offset);
      }

      const y = targetDate.getFullYear();
      const m = pad(targetDate.getMonth() + 1);
      const d = pad(targetDate.getDate());
      
      // yyyy/mm/dd.html のパスを生成 (ルートからの絶対パスで指定)
      const targetPath = `/${y}/${m}/${d}.html`;

      try {
        const res = await fetch(targetPath, { method: 'HEAD' });
        if (res.ok) {
          location.href = targetPath;
        } else {
          // 記事がない場合の処理
          alert(`${y}/${m}/${d} の記事はまだ作成されていません。`);
          // 404を避けるため、移動せずに現在のページに留まる
        }
      } catch (error) {
        // ローカル環境等でfetchが使えない場合は直接ジャンプを試みる
        location.href = targetPath;
      }
    };

    // ページ読み込み時の整合性チェック
    window.addEventListener('DOMContentLoaded', () => {
      const pathMatch = location.pathname.match(/\/(\d{4})\/(\d{2})\/(\d{2})\.html$/);
      const h3Element = document.querySelector('h3.bar3');
      
      if (pathMatch && h3Element) {
        const fileDateStr = `${pathMatch[1]}/${pathMatch[2]}/${pathMatch[3]}`;
        const contentMatch = h3Element.textContent.match(/(\d{4})\/(\d{2})\/(\d{2})/);
        
        if (contentMatch && contentMatch[0] !== fileDateStr) {
          // URLと中身の日付が違う場合は警告
          console.error("URLと表示日付が一致しません");
        }
        document.title = `${fileDateStr} プロ野球ニュースまとめ`;
      }
    });
  </script>
</head>
<body>
  <div class="nav-buttons">
    <button onclick="goToRelativeDay(-1)">Previous</button>
    <button onclick="goToRelativeDay(0)">Today</button>
    <button onclick="goToRelativeDay(1)">Next</button>
  </div>
  <div class="box1">
    <h3 class='bar3'><i class="fas fa-calendar-check"></i>2026/02/24</h3>
  </div>
</body>
</html>
