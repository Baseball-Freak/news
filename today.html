<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Daily Page</title>
  <style>
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 10pt;
      line-height: 1.6;
      padding: 2em;
      position: relative;
      color: #ddd; 
      background-color: #222;
    }

    .nav-buttons {
      position: absolute;
      top: 1em;
      left: 1em;
      display: flex;
      flex-direction: row;
      gap: 0.5em;
    }
    .nav-buttons button {
      width: 80px;
      height: 30px;
      font-size: 0.7em;
      padding: 0;
      border: 1px solid #666;
      border-radius: 4px;
      background-color: #333;
      color: #eee;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s, color 0.2s;
    }
    .nav-buttons button:hover {
      background-color: #555;
    }
    .box1 {
      margin-left: -1em;
      margin-top: 3em;
    }
    
    h3.bar3 {
      font-size: 1.2em;
      margin-left: 1em;
      color: #eee;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
  </style>
  <script>
    const pad = (n) => String(n).padStart(2, '0');

    // 現在表示しているページのURLから日付を取得
    const getCurrentDateFromURL = () => {
      const path = location.pathname;
      // 形式: /yyyy/mm/dd.html
      const match = path.match(/\/(\d{4})\/(\d{2})\/(\d{2})\.html$/);
      if (!match) return null;
      return {
        y: match[1],
        m: match[2],
        d: match[3],
        dateObj: new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]))
      };
    };

    const goToRelativeDay = async (offset) => {
      const current = getCurrentDateFromURL();
      const today = new Date();
      
      // 今日の日付のパス (戻り先用)
      const todayPath = `../../${today.getFullYear()}/${pad(today.getMonth() + 1)}/${pad(today.getDate())}.html`;

      let targetDate;
      if (offset === 0) {
        // 当日ボタンなら今日の日付へ
        targetDate = today;
      } else {
        if (!current) {
          location.href = "../../index.html"; // URLが異常ならトップへ
          return;
        }
        targetDate = new Date(current.dateObj);
        targetDate.setDate(targetDate.getDate() + offset);
      }

      const nextY = targetDate.getFullYear();
      const nextM = pad(targetDate.getMonth() + 1);
      const nextD = pad(targetDate.getDate());
      
      // yyyy/mm/dd.html 形式。
      // 現在の階層が /yyyy/mm/dd.html なので、2階層上がルート
      const targetPath = `../../${nextY}/${nextM}/${nextD}.html`;

      try {
        const res = await fetch(targetPath, { method: 'HEAD' });
        if (res.ok) {
          location.href = targetPath;
        } else {
          // 2. 記事がない場合は「当日」へ戻る
          alert("指定された日の記事がありません。当日のページに戻ります。");
          location.href = todayPath;
        }
      } catch (error) {
        // 通信エラー等の場合も、安全のために今日へ戻るか直接移動を試みる
        location.href = todayPath;
      }
    };

    window.addEventListener('DOMContentLoaded', () => {
      const current = getCurrentDateFromURL();
      if (!current) return;

      const h3Element = document.querySelector('h3.bar3');
      if (h3Element) {
        const textContent = h3Element.textContent;
        const contentMatch = textContent.match(/(\d{4})\/(\d{2})\/(\d{2})/);

        if (contentMatch) {
          const [_, year, mm, dd] = contentMatch;
          // URLの日付と、中身のh3の日付がズレていたらエラーページへ
          if (year !== current.y || mm !== current.m || dd !== current.d) {
            location.href = "../../blank.html";
            return;
          }
          document.title = `${year}/${mm}/${dd} プロ野球ニュースまとめ`;
        }
      }
    });
  </script>
</head>
<body>
  <div class="nav-buttons">
    <button onclick="goToRelativeDay(-1)">Previous</button>
    <button onclick="goToRelativeDay(0)">Today</button>
    <button onclick="goToRelativeDay(1)">Next</button>
  </div>
<div class="box1">
  <h3 class='bar3'><i class="fas fa-calendar-check"></i>2026/02/24</h3>
  </div>
</body>
</html>
