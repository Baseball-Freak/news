<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today’s Baseball Freak News</title>

  <style>
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 10pt;
      line-height: 1.6;
      padding: 2em;
      text-align: center;
      color: #333;
      margin: 0;
    }

    h2 {
      font-size: 1.4em;
      margin-bottom: 1em;
      color: #222;
    }

    #status {
      margin-top: 2em;
      font-weight: bold;
      color: #444;
    }

    #loading {
      font-size: 10pt;
      color: #666;
      margin-top: 1em;
    }
  </style>

  <script>
    // --- 自動リダイレクトスクリプト (yyyy/mm/dd.html 対応) ---
    window.onload = async () => {
      const status = document.getElementById("status");
      const loading = document.getElementById("loading");

      // 今日の日付を取得
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");

      // 修正：ハイフンをスラッシュに変更
      const targetURL = `${yyyy}/${mm}/${dd}.html`;
      const fallbackURL = "blank.html";

      status.textContent = `Checking for article: ${targetURL}`;

      try {
        // HEADリクエストでファイルの存在確認
        const res = await fetch(targetURL, { method: "HEAD" });
        
        if (res.ok) {
          loading.textContent = "記事が見つかりました。移動します...";
          setTimeout(() => (location.href = targetURL), 800);
        } else {
          // 404などのエラー時
          loading.textContent = "本日の記事はまだ準備中です。";
          setTimeout(() => (location.href = fallbackURL), 1200);
        }
      } catch (e) {
        // fetch自体が失敗する場合（CORS制限やネットワークエラー）
        console.warn("Fetch failed, attempting direct redirect as fallback.");
        loading.textContent = "ページを確認しています...";
        
        // fetchが動かない環境（ローカル実行など）を考慮し、
        // 1.5秒待っても動かなければ強制的に飛ばすか、blankへ
        setTimeout(() => {
          location.href = targetURL;
        }, 1000);
      }
    };
  </script>
</head>

<body>
  <h2>Baseball Freak - Today’s News</h2>
  <div id="status">記事を確認しています...</div>
  <div id="loading"></div>
</body>
</html>
